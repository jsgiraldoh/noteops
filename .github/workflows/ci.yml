name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancela ejecuciones anteriores de la misma rama/PR aún en curso
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── FASE 0 — Higiene ────────────────────────────────────────────────────────
  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historial completo para escanear todos los commits
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── FASE 1 — Backend: lint + pruebas + dependencias ─────────────────────────
  # Los pasos corren en orden: si go vet o las unit fallan (rápidas),
  # no se gasta tiempo en las pruebas de integración (lentas, con Docker).
  backend-test:
    name: Backend — vet, unit, integration, vuln
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: Pruebas unitarias
        working-directory: backend
        run: go test ./... -race -cover

      - name: Pruebas de integración (testcontainers)
        working-directory: backend
        run: go test -tags=integration ./internal/repository/... -count=1

      - name: Análisis de dependencias (govulncheck)
        working-directory: backend
        run: |
          # @v1.1.4 es la última versión compatible con Go 1.23.
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

          # Reporte legible completo en los logs (no bloquea por sí mismo).
          govulncheck ./... || true

          # Gate calibrado: BLOQUEAMOS solo si hay vulnerabilidades invocadas
          # en DEPENDENCIAS del proyecto. Las de la stdlib de Go se mitigan
          # actualizando el toolchain y aquí se reportan como advertencia.
          govulncheck -format json ./... > govuln.json || true
          # En cada finding, trace[0] es el sink vulnerable (su .module indica
          # dónde vive la vuln: "stdlib" o una dependencia) y trace[-1] es el
          # código del proyecto que la invoca. Contamos las que NO son stdlib.
          DEPS=$(jq -s '[.[] | select(.finding != null) | .finding
                         | select(.trace[0].function != null)
                         | .trace[0].module]
                         | map(select(. != "stdlib")) | length' govuln.json)
          echo "Vulnerabilidades invocadas en dependencias (excluyendo stdlib): $DEPS"
          if [ "$DEPS" -gt 0 ]; then
            echo "::error::Hay vulnerabilidades en dependencias del proyecto — actualízalas"
            exit 1
          fi
          echo "::warning::Solo quedan vulnerabilidades de la stdlib de Go (deuda de toolchain, ver hoja de ruta)"

  # ── FASE 1 — Frontend: type-check + build ───────────────────────────────────
  frontend-check:
    name: Frontend — check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      # SvelteKit genera los tipos de $env/static/public a partir de las
      # variables PUBLIC_* presentes al hacer sync; el .env las provee.
      - name: Preparar variables de entorno
        working-directory: frontend
        run: cp .env.example .env

      - name: Type check
        working-directory: frontend
        run: npm run check

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── FASE 2 — Análisis estático de código (SAST) ─────────────────────────────
  # CodeQL analiza Go y TypeScript. Los resultados aparecen en
  # Security → Code scanning. Gratis en repositorios públicos.
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # El módulo Go vive en backend/, por eso compilamos manualmente
      # en vez de usar autobuild (que busca go.mod en la raíz).
      - name: Compilar Go para CodeQL
        if: matrix.language == 'go'
        working-directory: backend
        run: go build ./...

      - name: Analizar
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  # ── FASE 3-5 — Build, escaneo de imagen y publicación ───────────────────────
  # Espera a que pasen TODOS los gates anteriores. Construye cada imagen UNA
  # vez (load al daemon local), Trivy escanea esa misma imagen, y solo en
  # push a main se publica :latest en GHCR. En PRs se construye y escanea
  # pero NO se publica.
  image:
    name: Build, scan & publish images
    runs-on: ubuntu-latest
    needs: [secrets, backend-test, frontend-check, codeql]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ──
      - name: Build backend (local)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: prod
          load: true
          tags: noteops-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Trivy — backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: noteops-backend:ci
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true # no bloquear por CVEs sin fix disponible

      # ── Frontend ──
      - name: Build frontend (local)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: prod
          load: true
          tags: noteops-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy — frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: noteops-frontend:ci
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      # ── Publicación (solo push a main) ──
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push :latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          docker tag noteops-backend:ci  "$REPO/backend:latest"
          docker tag noteops-frontend:ci "$REPO/frontend:latest"
          docker push "$REPO/backend:latest"
          docker push "$REPO/frontend:latest"
